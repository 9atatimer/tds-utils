# copilot-setup-steps.yml -- GitHub Copilot coding agent setup steps:
# bootstrap pinned clai + `clai provision` before the agent starts.
#
# Provider hook contract (Copilot coding agent):
#   GitHub runs the job named exactly `copilot-setup-steps` from
#   .github/workflows/copilot-setup-steps.yml in the target repo before
#   the Copilot agent begins work. The job runs as a normal Actions job in
#   an EMPTY runner workspace -- Copilot clones the repo for the agent only
#   AFTER these steps complete (per GitHub's docs, whose examples all begin
#   with actions/checkout) -- so this job performs its own checkout before
#   calling sandbox/provision.sh. Network is ON during setup steps.
#
# Install location (manual, by the human -- design non-goal to automate):
#   Copy this file to .github/workflows/copilot-setup-steps.yml in the
#   target repo. The job name `copilot-setup-steps` is load-bearing; do
#   not rename it.
#
# Secret requirement:
#   GH_AI_TOOLS_PAT -- a CLASSIC read:packages PAT (GitHub Packages npm
#   reads require the classic read:packages scope; fine-grained PATs have
#   no Packages permission -- RD2). Post-#84 clai and ast-mcp install from
#   GitHub Packages under nine-at-a-time-media and the skills/manifest live
#   in that repo, so a single owner-scoped token covers the whole bootstrap
#   (no cross-owner PAT juggling).
#
#   Put it on the AGENTS secrets surface: repo Settings -> Security ->
#   Secrets and variables -> Agents. NOT Actions secrets, and NOT the old
#   `copilot` Actions environment. GitHub's docs are explicit: "Copilot cloud
#   agent does not have access to GitHub Actions, Codespaces, or Dependabot
#   secrets and variables. Only Agents secrets and variables are passed to
#   the agent." The `copilot` environment was the pre-2026-05 mechanism and
#   its contents were auto-migrated to the Agents surface; a repo that still
#   has an empty `copilot` environment is carrying a fossil. Agents secrets
#   are exposed to this workflow automatically -- no `environment:` key is
#   needed on the job.
#
#   Without it the bootstrap fails loudly-but-open and the Copilot session
#   starts unprovisioned. The default GITHUB_TOKEN cannot read Packages.
#
#   Note: running this workflow manually via workflow_dispatch reads ACTIONS
#   secrets instead (that is a normal Actions run, not a Copilot run), so a
#   green manual run does NOT prove Copilot can see the token. Both surfaces
#   need the secret if you want both paths to work.
#
# Note: Copilot's MCP config is a repo SETTING (via `gh api`), not a file
# this job can write -- explicitly a non-goal in PROVISION.DESIGN.md;
# skills provisioning is what this buys today.

name: "Copilot Setup Steps"

# Copilot does NOT use these triggers -- it runs the copilot-setup-steps job
# out of band when a task starts. They exist so the workflow is also
# validated as a normal Actions run: manually from the Actions tab, and
# automatically whenever this file changes (GitHub's recommended example).
# The workflow must be on the DEFAULT BRANCH or Copilot ignores it entirely.
on:
  workflow_dispatch:
  push:
    paths: [.github/workflows/copilot-setup-steps.yml]
  pull_request:
    paths: [.github/workflows/copilot-setup-steps.yml]

jobs:
  # The job name is load-bearing: GitHub looks for exactly this name and
  # ignores everything else in the file. Only steps, permissions, runs-on,
  # services, snapshot and timeout-minutes (max 59) are honored.
  copilot-setup-steps:
    # Copilot supports Ubuntu x64 and Windows 64-bit runners only.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Provision agent tooling (pinned clai bootstrap + clai provision)
        run: bash sandbox/provision.sh
        env:
          GH_AI_TOOLS_PAT: ${{ secrets.GH_AI_TOOLS_PAT }}
