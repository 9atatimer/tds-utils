# copilot-setup-steps.yml -- GitHub Copilot coding agent setup steps:
# bootstrap pinned clai + `clai provision` before the agent starts.
#
# Provider hook contract (Copilot coding agent):
#   GitHub runs the job named exactly `copilot-setup-steps` from
#   .github/workflows/copilot-setup-steps.yml in the target repo before
#   the Copilot agent begins work. The job runs as a normal Actions job in
#   an EMPTY runner workspace -- Copilot clones the repo for the agent only
#   AFTER these steps complete (per GitHub's docs, whose examples all begin
#   with actions/checkout) -- so this job performs its own checkout before
#   calling sandbox/provision.sh. Network is ON during setup steps.
#
# Install location (manual, by the human -- design non-goal to automate):
#   Copy this file to .github/workflows/copilot-setup-steps.yml in the
#   target repo. The job name `copilot-setup-steps` is load-bearing; do
#   not rename it.
#
# Secret requirement:
#   GH_AI_TOOLS_PAT -- a fine-grained PAT with Contents:read on the
#   private repos 9atatimer/ai-tools and
#   nine-at-a-time-media/template-tools. Add it to the repo's Actions
#   secrets (or the `copilot` environment's secrets) so the env: mapping
#   below resolves. Without it the bootstrap fails loudly-but-open and the
#   Copilot session starts unprovisioned. The default GITHUB_TOKEN is
#   repo-scoped and cannot read the private source repos.
#
# Note: Copilot's MCP config is a repo SETTING (via `gh api`), not a file
# this job can write -- explicitly a non-goal in PROVISION.DESIGN.md;
# skills provisioning is what this buys today.

name: "Copilot Setup Steps"

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Provision agent tooling (pinned clai bootstrap + clai provision)
        run: bash sandbox/provision.sh --copy
        env:
          GH_AI_TOOLS_PAT: ${{ secrets.GH_AI_TOOLS_PAT }}
