# tmux.conf — log-hoarder
# Symlink this to ~/.tmux.conf (or include it from there).
#
# Requires:
#   - tmux_logging.sh and tmux_shepherd.sh in ~/workplace/tds-utils/bin/
#     (symlinks to ../log-hoarder/ originals)
#   - TDS_LOG_DIR set in environment before tmux starts
#   - ansifilter installed (brew install ansifilter) for clean log output

# --- General settings ---

set -g mouse on
set -g mode-keys emacs

# --- Outer terminal title ---
# Push a meaningful title into the host terminal (Terminal.app, iTerm2, etc.)
# whenever the active pane changes (session/window/pane switch).
# Format: "session window-index/window-count · window-name · pwd-basename"
# Note (macOS Terminal.app): uncheck "Active Process Name" in
# Preferences → Profiles → Window → Title, or this string gets prepended
# with "tmux new-session" noise. "Dimensions" can stay on.
set -g set-titles on
set -g set-titles-string '#S #I/#{session_windows} · #W · #{b:pane_current_path}'

# --- Window-list labels in status bar ---
# Default '#I:#W#F' shows just index + window-name (which under auto-rename
# is the current command), giving useless lists like
# "0:claude.exe 1:claude.exe 2:claude.exe". Add cwd basename so each window
# label tells you what project it's in.
# #I = index, #{b:pane_current_path} = pwd basename, #W = window name (auto = cmd),
# #F = flags (* current, - last, Z zoomed, etc.).
set -g window-status-format         '#I:#{b:pane_current_path}/#W#F'
set -g window-status-current-format '#I:#{b:pane_current_path}/#W#F'

# Don't exit copy mode when scrolling to the bottom of the pane.
# Default uses copy-mode -e which auto-exits, killing any active selection.
bind -T root WheelUpPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode }

# Seesaw selection: left-click sets anchor, selection stays live.
# Subsequent left-clicks move the cursor end (seesaw).
bind -T copy-mode MouseDown1Pane select-pane \; send-keys -X begin-selection
# Drag extends; release keeps selection live (no stop, no copy).
unbind -T copy-mode MouseDragEnd1Pane
# Right-click copies selection to clipboard and exits copy mode.
bind -T copy-mode MouseDown3Pane send-keys -X copy-pipe-and-cancel "clip"
# Double-click selects word, triple-click selects line — selection stays live.
bind -T root DoubleClick1Pane select-pane \; copy-mode \; send-keys -X select-word
bind -T root TripleClick1Pane select-pane \; copy-mode \; send-keys -X select-line
bind -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word
bind -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line
# M-w copies to clipboard and exits copy mode.
bind -T copy-mode M-w send-keys -X copy-pipe-and-cancel "clip"

# --- Auto-logging hooks ---
# Fire the logging script for every new pane surface.

set-hook -g session-created    'run-shell "/bin/zsh $HOME/workplace/tds-utils/bin/tmux_logging.sh"'
set-hook -g after-new-window   'run-shell "/bin/zsh $HOME/workplace/tds-utils/bin/tmux_logging.sh"'
set-hook -g after-split-window 'run-shell "/bin/zsh $HOME/workplace/tds-utils/bin/tmux_logging.sh"'

# On pane exit, tell the shepherd which pane's log dir to retire.
# session_name, window_index, pane_index are still valid at pane-exited time.
set-hook -g pane-exited 'run-shell "/bin/zsh $HOME/workplace/tds-utils/bin/tmux_shepherd.sh #{session_name} #{window_index} #{pane_index}"'
